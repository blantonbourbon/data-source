<style>
  .cards.direction-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));

  }

  .tab-row,

    gap: 8px;
    flex-wrap: wrap;

  .pill {

    height: 18px;

  .stats-row {

  .module-card {

  .line {

  .line.sm { width: 42%; }
  .line.md { width: 62%; }
  .line.lg { width: 86%; }

  .workspace-layout {
    display: grid;
    grid-template-columns: 1.8fr 1fr;
    gap: 10px;
  }

  .workspace-main {
    min-height: 130px;
  }

  .workspace-side {
    min-height: 130px;
  }

  .workspace-tab {
    width: 56px;
    height: 18px;
  }

  .workspace-chip {
    width: 44px;
    height: 16px;
  }

  .menu-item {
    width: 100%;
    height: 18px;
    margin-bottom: 8px;
  }

  .a-shell { background: linear-gradient(135deg, #0c1a2f 0%, #0b2347 100%); color: #d7e8ff; }
  .a-search, .a-pill, .a-tab, .a-chip, .a-menu, .a-line { background: rgba(145, 192, 255, 0.22); }

  .b-search, .b-pill, .b-tab, .b-chip, .b-menu, .b-line { background: rgba(237, 200, 137, 0.22); }

  @media (max-width: 1100px) {
    .cards.direction-grid {

  }
